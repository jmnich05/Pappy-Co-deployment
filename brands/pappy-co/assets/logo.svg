<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" aria-label="Pappy &amp; Company">
  <g fill="#E6B10E">
    <!-- Center vertical key -->
    <g>
      <!-- Trefoil bow at top -->
      <circle cx="100" cy="38" r="14"/>
      <circle cx="84" cy="54" r="14"/>
      <circle cx="116" cy="54" r="14"/>
      <circle cx="100" cy="48" r="7" fill="#FFFFFF"/>
      <!-- Shaft -->
      <rect x="96" y="68" width="8" height="148"/>
      <!-- Bit / teeth -->
      <rect x="96" y="206" width="22" height="6"/>
      <rect x="96" y="194" width="14" height="6"/>
    </g>
    <!-- Left diagonal key (rotated -32 around center 100,120) -->
    <g transform="rotate(-32, 100, 120)">
      <circle cx="100" cy="42" r="12"/>
      <circle cx="86" cy="56" r="12"/>
      <circle cx="114" cy="56" r="12"/>
      <circle cx="100" cy="50" r="6" fill="#FFFFFF"/>
      <rect x="96" y="70" width="8" height="135"/>
      <rect x="96" y="195" width="20" height="5"/>
      <rect x="96" y="185" width="13" height="5"/>
    </g>
    <!-- Right diagonal key (rotated +32 around center 100,120) -->
    <g transform="rotate(32, 100, 120)">
      <circle cx="100" cy="42" r="12"/>
      <circle cx="86" cy="56" r="12"/>
      <circle cx="114" cy="56" r="12"/>
      <circle cx="100" cy="50" r="6" fill="#FFFFFF"/>
      <rect x="96" y="70" width="8" height="135"/>
      <rect x="96" y="195" width="20" height="5"/>
      <rect x="96" y="185" width="13" height="5"/>
    </g>
  </g>
</svg>
